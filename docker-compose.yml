version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AWS_REGION=us-east-1
      - SES_REGION=us-east-1
      - SES_SENDER_EMAIL=enrique.coello@gmail.com
      - NOTIFICATION_EMAIL=enrique.coello@gmail.com
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_DEBUG=false
      - DEFAULT_INSTANCE_TYPE=t3.micro
      - DEFAULT_REGION=us-east-1
    volumes:
      - ~/.aws:/root/.aws:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
